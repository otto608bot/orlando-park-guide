<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Kingdom Rides & Character Dining | Plan Your Park</title>
  <meta name="description" content="Complete guide to Animal Kingdom rides and character dining. Filter by height, pregnancy safety, and find the perfect character meals.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #4A9DE8;
      --action-orange: #F37021;
      --deep-purple: #5A4FCF;
      --splash-teal: #38B2AC;
      --base-dark: #2D3748;
      --bg-off-white: #F8F9FA;
      --white: #FFFFFF;
      --gray-100: #F7FAFC;
      --gray-200: #EDF2F7;
      --gray-300: #E2E8F0;
      --gray-400: #CBD5E0;
      --gray-500: #A0AEC0;
      --gray-600: #718096;
      --gray-700: #4A5568;
      
      --font-heading: 'Nunito', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-body);
      background: var(--bg-off-white);
      color: var(--base-dark);
      line-height: 1.6;
    }
    
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    
    .logo { display: flex; align-items: center; }
    .logo-img { height: 48px; width: auto; }
    
    .nav {
      display: flex;
      gap: 2rem;
      margin-left: auto;
    }
    
    .nav a {
      color: var(--gray-600);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9375rem;
      transition: color 0.2s;
    }
    
    .nav a:hover, .nav a.active { color: var(--action-orange); }
    
    /* Hero */
    .park-hero {
      background: linear-gradient(135deg, #26a269 0%, #4ade80 100%);
      color: white;
      padding: 4rem 2rem;
      text-align: center;
    }
    
    .park-hero h1 {
      font-family: var(--font-heading);
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    
    .park-hero p {
      font-size: 1.25rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto 1.5rem;
    }
    
    .affiliate-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: var(--action-orange);
      color: white;
      text-decoration: none;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(243, 112, 33, 0.3);
    }
    
    .affiliate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(243, 112, 33, 0.4);
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }
    
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    
    .section-title {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--base-dark);
    }
    
    .section-count {
      font-size: 1rem;
      color: var(--gray-500);
    }
    
    /* Ride Grid */
    .ride-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }
    
    .ride-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    
    .ride-card:hover {
      border-color: var(--gray-300);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .ride-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }
    
    .ride-name {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--base-dark);
      flex: 1;
    }
    
    .ride-type {
      font-size: 0.75rem;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-weight: 500;
      white-space: nowrap;
    }
    
    .ride-description {
      font-size: 0.875rem;
      color: var(--gray-600);
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    
    .ride-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: var(--gray-500);
    }
    
    .ride-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    
    .tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-full);
      font-weight: 600;
    }
    
    .tag-height {
      background: rgba(243, 112, 33, 0.1);
      color: var(--action-orange);
    }
    
    .tag-pregnancy {
      background: rgba(56, 178, 172, 0.1);
      color: var(--splash-teal);
    }
    
    /* Character Meal Cards */
    .meal-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.5rem;
    }
    
    .meal-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }
    
    .meal-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--gray-300);
    }
    
    .meal-card-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--gray-200);
      background: linear-gradient(135deg, rgba(26, 95, 180, 0.05) 0%, rgba(53, 132, 228, 0.05) 100%);
    }
    
    .meal-card-title {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--base-dark);
      margin-bottom: 0.5rem;
    }
    
    .meal-card-location {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--gray-600);
    }
    
    .location-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.5rem;
      background: #26a269;
      color: white;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .meal-card-body {
      padding: 1.25rem;
    }
    
    .characters-section {
      margin-bottom: 1rem;
    }
    
    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    
    .characters-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    
    .character-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      background: var(--gray-100);
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--base-dark);
    }
    
    .meals-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .meal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.625rem 0.875rem;
      background: var(--gray-50);
      border-radius: var(--radius-md);
    }
    
    .meal-row.available {
      background: rgba(56, 178, 172, 0.08);
    }
    
    .meal-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .meal-time {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--base-dark);
    }
    
    .meal-type {
      font-size: 0.75rem;
      color: var(--gray-500);
    }
    
    .meal-price {
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--action-orange);
      font-size: 0.9375rem;
    }
    
    .meal-card-footer {
      padding: 1rem 1.25rem;
      background: var(--gray-50);
      border-top: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .dining-plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.5rem;
      background: rgba(74, 157, 232, 0.1);
      color: var(--primary-blue);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .book-btn {
      padding: 0.5rem 1rem;
      background: var(--action-orange);
      color: white;
      border: none;
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .book-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(243, 112, 33, 0.3);
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gray-600);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 2rem;
    }
    
    .back-link:hover {
      color: var(--action-orange);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .park-hero h1 { font-size: 2rem; }
      .ride-grid, .meal-cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <img src="/logo-full.png" alt="Plan Your Park" class="logo-img">
      </a>
      <nav class="nav">
        <a href="/">Rides</a>
        <a href="/character-meals.html">Character Meals</a>
        <a href="/blog/">Blog</a>
      </nav>
    </div>
  </header>

  <section class="park-hero">
    <h1>🦁 Animal Kingdom</h1>
    <p>A celebration of nature and wildlife — explore exotic lands, thrilling safaris, and Pandora.</p>
    <a href="https://www.dpbolvw.net/click-101693488-5527150" target="_blank" rel="noopener noreferrer" class="affiliate-btn">
      Get Animal Kingdom Tickets
    </a>
  </section>

  <div class="container">
    <a href="/" class="back-link">← Back to All Parks</a>

    <!-- Rides Section -->
    <div class="section-header">
      <h2 class="section-title">Rides & Attractions</h2>
      <span class="section-count" id="ride-count">Loading...</span>
    </div>
    <div class="ride-grid" id="rides-container">
      <!-- Rides injected by JavaScript -->
    </div>

    <!-- Character Meals Section -->
    <div class="section-header">
      <h2 class="section-title">Character Dining</h2>
      <span class="section-count" id="meal-count">Loading...</span>
    </div>
    <div class="meal-cards-grid" id="meals-container">
      <!-- Character meals injected by JavaScript -->
    </div>
  </div>

  <script src="data/rides.js"></script>
  <script src="data/character-meal-data.js"></script>
  <script>
    // Filter rides for Animal Kingdom
    const mkRides = rideData.filter(ride => ride.park === 'Animal Kingdom');
    
    // Filter character meals for Animal Kingdom
    const mkMeals = disneyCharacterMeals.filter(meal => 
      meal.location.park === 'Animal Kingdom'
    );
    
    // Render rides
    function renderRides() {
      const container = document.getElementById('rides-container');
      document.getElementById('ride-count').textContent = `${mkRides.length} rides`;
      
      container.innerHTML = mkRides.map(ride => {
        const heightTag = ride.height > 0 
          ? `<span class="tag tag-height">${ride.height}" height</span>` 
          : `<span class="tag tag-height">Any height</span>`;
        
        const pregnancyTag = ride.pregnant 
          ? `<span class="tag tag-pregnancy">Pregnancy safe</span>` 
          : '';
        
        return `
          <div class="ride-card">
            <div class="ride-header">
              <span class="ride-name">${ride.name}</span>
              <span class="ride-type">${ride.type}</span>
            </div>
            <p class="ride-description">${ride.description}</p>
            <div class="ride-meta">
              <span class="meta-item">⏱️ ${ride.duration}</span>
            </div>
            <div class="ride-tags">
              ${heightTag}
              ${pregnancyTag}
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Render character meals
    function renderMeals() {
      const container = document.getElementById('meals-container');
      document.getElementById('meal-count').textContent = `${mkMeals.length} locations`;
      
      if (mkMeals.length === 0) {
        container.innerHTML = '<p style="color:var(--gray-500)">No character dining locations in this park. Check nearby resorts!</p>';
        return;
      }
      
      container.innerHTML = mkMeals.map(meal => {
        const allChars = [
          ...(meal.characters.breakfast || []),
          ...(meal.characters.lunch || []),
          ...(meal.characters.dinner || [])
        ];
        const uniqueChars = [...new Set(allChars)];
        
        const mealsHtml = ['breakfast', 'lunch', 'dinner'].map(time => {
          const mealData = meal.meals[time];
          if (!mealData || !mealData.available) {
            return `<div class="meal-row">
              <span class="meal-time">${time.charAt(0).toUpperCase() + time.slice(1)}</span>
              <span style="color:var(--gray-400);font-size:0.75rem">Not available</span>
            </div>`;
          }
          const price = mealData.price ? `$${mealData.price.adult}` : 'Check price';
          return `
            <div class="meal-row available">
              <div class="meal-info">
                <span class="meal-time">${time.charAt(0).toUpperCase() + time.slice(1)}</span>
                <span class="meal-type">${mealData.type}</span>
              </div>
              <span class="meal-price">${price}</span>
            </div>
          `;
        }).join('');
        
        return `
          <div class="meal-card">
            <div class="meal-card-header">
              <div class="meal-card-title">${meal.name}</div>
              <div class="meal-card-location">
                <span class="location-badge">🦁 Animal Kingdom</span>
              </div>
            </div>
            <div class="meal-card-body">
              <div class="characters-section">
                <div class="section-label">Characters You'll Meet</div>
                <div class="characters-list">
                  ${uniqueChars.slice(0, 6).map(c => 
                    `<span class="character-chip">${c.split(' ')[0]}</span>`
                  ).join('')}
                  ${uniqueChars.length > 6 ? `<span class="character-chip">+${uniqueChars.length - 6} more</span>` : ''}
                </div>
              </div>
              <div class="meals-section">
                <div class="section-label">Available Meals</div>
                ${mealsHtml}
              </div>
            </div>
            <div class="meal-card-footer">
              ${meal.diningPlan ? `<span class="dining-plan-badge">✓ Dining Plan</span>` : '<span></span>'}
              <a href="https://disneyworld.disney.go.com/dining/${meal.id}/" target="_blank" class="book-btn">Check Availability</a>
            </div>
          </div>
        `;
      }).join('');
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      renderRides();
      renderMeals();
    });
  </script>
</body>
</html>
