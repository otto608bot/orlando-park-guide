[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

[context.production]
  command = "npm run build"

[context.staging]
  command = "npm run build"

# Redirects for clean URLs (remove .html extension)
[[redirects]]
  from = "/index"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/park"
  to = "/park/"
  status = 301
  force = true

[[redirects]]
  from = "/park.html"
  to = "/park/"
  status = 301
  force = true

[[redirects]]
  from = "/rides"
  to = "/rides/"
  status = 301
  force = true

[[redirects]]
  from = "/rides.html"
  to = "/rides/"
  status = 301
  force = true

[[redirects]]
  from = "/character-dining"
  to = "/character-dining/"
  status = 301
  force = true

[[redirects]]
  from = "/character-dining.html"
  to = "/character-dining/"
  status = 301
  force = true

[[redirects]]
  from = "/deals"
  to = "/deals/"
  status = 301
  force = true

[[redirects]]
  from = "/deals.html"
  to = "/deals/"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/blog.html"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*/"
  to = "/blog/:splat"
  status = 301
  force = true

# Preserve .well-known for security.txt
[[redirects]]
  from = "/.well-known/security.txt"
  to = "/.well-known/security.txt"
  status = 200
  force = true

# SPA-style fallback for park pages (park pages use query strings)
[[redirects]]
  from = "/park/*"
  to = "/park/index.html"
  status = 200
  force = true

[headers]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
# Local Netlify folder
.netlify
node_modules/
