[build]
  command = "npm run build"
  publish = "_site"

# Main pages without trailing slashes
[[redirects]]
  from = "/park"
  to = "/park/"
  status = 301

[[redirects]]
  from = "/rides"
  to = "/rides/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/deals"
  to = "/deals/"
  status = 301

[[redirects]]
  from = "/character-dining"
  to = "/character-dining/"
  status = 301

# Legacy .html URLs for blog posts
[[redirects]]
  from = "/blog/*.html"
  to = "/blog/:splat/"
  status = 301

# Ensure trailing slashes everywhere
[[redirects]]
  from = "/*[^/]"
  to = "/:splat/"
  status = 301
  force = true

# Handle old blog URLs
[[redirects]]
  from = "/blog/*[^/]"
  to = "/blog/:splat/"
  status = 301
  force = true
