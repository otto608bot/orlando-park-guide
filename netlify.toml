[build]
  command = "npm run build"
  publish = "_site"

[context.production]
  command = "npm run build"

[context.staging]
  command = "npm run build"

[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat/"
  status = 200
  force = true

[[redirects]]
  from = "/character-dining"
  to = "/character-dining/"
  status = 301

[[redirects]]
  from = "/deals"
  to = "/deals/"
  status = 301

[[redirects]]
  from = "/park"
  to = "/park/"
  status = 301

[[redirects]]
  from = "/rides"
  to = "/rides/"
  status = 301

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/.well-known/security.txt"
  to = "/.well-known/security.txt"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://m.media-amazon.com https://images-na.ssl-images-amazon.com https://ws-na.amazon-adsystem.com data:; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
