<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride Images Mobile Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    h1 {
      margin-bottom: 20px;
      font-size: 1.25rem;
    }
    
    .test-info {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.875rem;
      color: #666;
    }
    
    .ride-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    
    .ride-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    .ride-card-image {
      width: 100%;
      height: 140px;
      overflow: hidden;
      position: relative;
      background: #f0f0f0;
    }
    
    .ride-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      /* Mobile Safari fixes */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }
    
    /* Mobile image fixes */
    @media (max-width: 1024px) {
      .ride-card-image {
        height: 160px;
        min-height: 160px;
      }
      
      .ride-card-image img {
        min-height: 160px;
      }
    }
    
    @media (max-width: 640px) {
      .ride-grid {
        grid-template-columns: 1fr;
      }
      
      .ride-card-image {
        height: 180px;
        min-height: 180px;
      }
      
      .ride-card-image img {
        min-height: 180px;
      }
    }
    
    .ride-card-content {
      padding: 16px;
    }
    
    .ride-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .ride-type {
      font-size: 0.75rem;
      color: #718096;
      background: #f7fafc;
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    
    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    
    .status.success {
      background: #c6f6d5;
      color: #22543d;
    }
    
    .status.error {
      background: #fed7d7;
      color: #742a2a;
    }
  </style>
</head>
<body>
  <h1>🎢 Ride Images Mobile Test</h1>
  
  <div class="test-info">
    <strong>Testing:</strong> Images use <code>decoding="async"</code> instead of <code>loading="lazy"</code> <br>
    <strong>Includes:</strong> width/height attributes, mobile Safari fixes (-webkit-transform), min-height constraints
  </div>

  <div class="ride-grid" id="ride-grid">
    <!-- Cards will be injected here -->
  </div>

  <script>
    // Test ride data
    const testRides = [
      { id: 'mk-space-mountain', name: 'Space Mountain', type: 'Coaster', image: '/images/rides/mk-space-mountain.jpg' },
      { id: 'mk-big-thunder', name: 'Big Thunder Mountain', type: 'Coaster', image: '/images/rides/mk-big-thunder.jpg' },
      { id: 'mk-haunted-mansion', name: 'Haunted Mansion', type: 'Dark Ride', image: '/images/rides/mk-haunted-mansion.jpg' },
      { id: 'mk-seven-dwarfs', name: 'Seven Dwarfs Mine Train', type: 'Coaster', image: '/images/rides/mk-seven-dwarfs.jpg' },
      { id: 'epcot-guardians', name: 'Guardians of the Galaxy', type: 'Coaster', image: '/images/rides/epcot-guardians.jpg' },
      { id: 'hs-rise-resistance', name: 'Rise of the Resistance', type: 'Trackless Dark Ride', image: '/images/rides/hs-rise-resistance.jpg' }
    ];
    
    const defaultImage = '/images/rides/mk-space-mountain.jpg';
    
    function renderTestCards() {
      const grid = document.getElementById('ride-grid');
      
      grid.innerHTML = testRides.map(ride => {
        return `
          <div class="ride-card">
            <div class="ride-card-image">
              <img 
                src="${ride.image}" 
                alt="${ride.name}" 
                decoding="async" 
                width="400" 
                height="300"
                onerror="this.src='${defaultImage}'"
                onload="updateStatus('${ride.id}', true)"
              >
            </div>
            <div class="ride-card-content">
              <div class="ride-name">${ride.name}</div>
              <span class="ride-type">${ride.type}</span>
              <div class="status" id="status-${ride.id}">Loading...</div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function updateStatus(rideId, success) {
      const statusEl = document.getElementById(`status-${rideId}`);
      if (statusEl) {
        statusEl.textContent = success ? '✅ Image loaded successfully' : '❌ Failed to load';
        statusEl.className = 'status ' + (success ? 'success' : 'error');
      }
    }
    
    // Render on load
    renderTestCards();
    
    // Log device info
    console.log('User Agent:', navigator.userAgent);
    console.log('Viewport width:', window.innerWidth);
    console.log('Device pixel ratio:', window.devicePixelRatio);
  </script>
</body>
</html>
