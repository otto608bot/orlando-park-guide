---
layout: layouts/base.njk
permalink: /rides.html
title: All Rides
description: Browse all rides at Disney World, Universal Orlando, SeaWorld & LEGOLAND. Filter by height, pregnancy safety, wheelchair accessibility, and sensory needs.
---

<style>
    :root {
      --primary-blue: #4A9DE8;
      --action-orange: #F37021;
      --deep-purple: #5A4FCF;
      --splash-teal: #38B2AC;
      --base-dark: #2D3748;
      --bg-off-white: #F8F9FA;
      --white: #FFFFFF;
      --gray-50: #F9FAFB;
      --gray-100: #F7FAFC;
      --gray-200: #EDF2F7;
      --gray-300: #E2E8F0;
      --gray-400: #CBD5E0;
      --gray-500: #A0AEC0;
      --gray-600: #718096;
      --gray-700: #4A5568;
      --font-heading: 'Nunito', sans-serif;
      --font-body: 'Inter', sans-serif;
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
      --shadow-orange: 0 4px 12px rgba(243, 112, 33, 0.3);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg-off-white);
      color: var(--base-dark);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    /* Layout */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: var(--space-xl);
      padding: var(--space-xl);
    }
    
    /* Content Wrapper */
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--space-xl);
      width: 100%;
    }
    
    .content-wrapper h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: var(--space-lg);
      color: var(--base-dark);
    }
    
    /* Ride Filters */
    #ride-filters {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }
    
    .ride-count {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gray-600);
      background: var(--white);
      padding: var(--space-md) var(--space-lg);
      border-radius: var(--radius-md);
      border: 1px solid var(--gray-200);
    }
    
    .ride-count .highlight {
      color: var(--action-orange);
      font-size: 1.5rem;
    }
    
    /* Filter Chips */
    .filter-chips {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }
    
    .filter-chip {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      background: var(--gray-100);
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-600);
      transition: all 0.2s;
    }
    
    .filter-chip:hover {
      border-color: var(--gray-300);
    }
    
    .filter-chip.active {
      background: rgba(243, 112, 33, 0.1);
      border-color: var(--action-orange);
      color: var(--action-orange);
    }
    
    /* Ride Grid */
    #rides-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-lg);
    }
    
    /* Ride Card */
    .ride-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .ride-card:hover {
      border-color: var(--gray-300);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .ride-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-sm);
    }
    
    .ride-card-name {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--base-dark);
    }
    
    .ride-card-type {
      font-size: 0.75rem;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-sm);
    }
    
    .ride-card-park {
      font-size: 0.875rem;
      color: var(--gray-600);
      margin-bottom: var(--space-sm);
    }
    
    .ride-card-description {
      font-size: 0.875rem;
      color: var(--gray-600);
      margin-bottom: var(--space-md);
    }
    
    .ride-card-tags {
      display: flex;
      gap: var(--space-xs);
      flex-wrap: wrap;
    }
    
    .tag {
      font-size: 0.75rem;
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-full);
      font-weight: 600;
    }
    
    .tag-height { background: rgba(243, 112, 33, 0.1); color: var(--action-orange); }
    .tag-pregnancy { background: rgba(56, 178, 172, 0.1); color: var(--splash-teal); }
    .tag-wheelchair { background: rgba(74, 157, 232, 0.1); color: var(--primary-blue); }
    .tag-sensory { background: rgba(90, 79, 207, 0.1); color: var(--deep-purple); }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }
    
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    
    .modal .close {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--gray-500);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .content-wrapper { padding: var(--space-lg); }
      .content-wrapper h1 { font-size: 1.75rem; }
      #rides-grid { grid-template-columns: 1fr; }
      .layout { flex-direction: column; padding: var(--space-lg); }
    }
</style>

<div class="content-wrapper">
  <h1>All Rides</h1>
  
  <div id="ride-filters">
    <div class="ride-count">
      <span id="shown-rides">0</span> of <span id="total-rides">0</span> RIDES
    </div>
  </div>

  <div id="rides-grid">
    <!-- Ride cards will be injected by filter-system.js -->
  </div>
</div>

<div id="ride-modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div id="ride-details">
      <!-- Ride details will be injected by ride-modal.js -->
    </div>
  </div>
</div>
